<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Invincible Yayın Takvimi</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body, html {
      height: 100%;
      overflow: hidden;
      color: white;
    }

    .bg {
      position: fixed;
      width: 100%;
      height: 100%;
      background: url('https://files.catbox.moe/k58b72.png') no-repeat center;
      background-size: cover;
      transform: scale(1.1);
      z-index: -2;
    }

    .blur {
      position: fixed;
      width: 100%;
      height: 100%;
      backdrop-filter: blur(12px);
      background: rgba(0,0,0,0.5);
      z-index: -1;
    }

    .container {
      text-align: center;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.6);
      padding: 40px;
      border-radius: 20px;
      animation: fadeIn 1.5s ease forwards;
      min-width: 320px;
    }

    h1 {
      margin-bottom: 25px;
    }

    .episode {
      margin: 18px 0;
      font-size: 18px;
    }

    .time {
      color: #00ffd5;
      font-weight: bold;
      display: block;
      margin-top: 5px;
      font-size: 20px;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translate(-50%, -40%); }
      to { opacity: 1; transform: translate(-50%, -50%); }
    }
  </style>
</head>

<body>

  <div class="bg" id="bg"></div>
  <div class="blur"></div>

  <div class="container">
    <h1>Invincible Yayın Takvimi</h1>

    <div class="episode">
      4. Sezon 7. Bölüm
      <span class="time" id="ep2">Yükleniyor...</span>
    </div>

    <div class="episode">
      4. Sezon 8. Bölüm
      <span class="time" id="ep3">Yükleniyor...</span>
    </div>
  </div>

  <script>
    const episodes = [
      { id: "ep2", time: 1776236400 },
      { id: "ep3", time: 1776841200 }
    ];

    function formatCountdown(seconds) {
      if (seconds <= 0) return "YAYINLANDI 🎉";

      const d = Math.floor(seconds / 86400);
      const h = Math.floor((seconds % 86400) / 3600);
      const m = Math.floor((seconds % 3600) / 60);
      const s = Math.floor(seconds % 60);

      return `${d}g ${h}s ${m}d ${s}sn`;
    }

    function updateTimers() {
      const now = Math.floor(Date.now() / 1000);

      episodes.forEach(ep => {
        const diff = ep.time - now;
        document.getElementById(ep.id).textContent = formatCountdown(diff);
      });
    }

    updateTimers();
    setInterval(updateTimers, 1000);

    // Parallax
    document.addEventListener("mousemove", (e) => {
      const x = (e.clientX / window.innerWidth - 0.5) * 20;
      const y = (e.clientY / window.innerHeight - 0.5) * 20;

      document.getElementById("bg").style.transform =
        `scale(1.1) translate(${x}px, ${y}px)`;
    });
  </script>

</body>
</html>
