<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIF Arşivi - bum</title>
    <meta property="og:title" content="GIF Arşivi">
    <meta property="og:description" content="Tüm GIF'lerim burada!">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://goyzinparis.vercel.app">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
            min-height: 100vh;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header {
            text-align: center;
            color: white;
            padding: 40px 20px;
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            margin-bottom: 30px;
        }
        h1 { font-size: 3em; margin-bottom: 10px; }
        .stats {
            display: inline-block;
            background: rgba(255,255,255,0.2);
            padding: 8px 16px;
            border-radius: 20px;
            margin-top: 15px;
        }
        .controls {
            background: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn:hover { transform: translateY(-2px); }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .btn-success { background: #10b981; color: white; }
        .btn-danger { background: #ef4444; color: white; }
        .btn-warning { background: #f59e0b; color: white; }
        .search-box {
            flex: 1;
            min-width: 200px;
            padding: 12px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 16px;
        }
        .gif-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            padding: 20px 0;
        }
        .gif-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s;
            cursor: pointer;
        }
        .gif-card:hover { transform: translateY(-5px); }
        .gif-container {
            position: relative;
            background: #f8f9fa;
            min-height: 200px;
        }
        .gif-container img { width: 100%; height: auto; display: block; }
        .gif-number {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
        }
        .copy-btn {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: rgba(0,0,0,0.7);
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
        }
        .copy-btn:hover { background: rgba(102, 126, 234, 0.9); }
        .gif-info { padding: 15px; background: white; }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            z-index: 1000;
        }
        .status-bar {
            position: fixed;
            bottom: 10px;
            right: 10px;
            background: rgba(0,0,0,0.8);
            color: #0f0;
            padding: 8px 12px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 11px;
            z-index: 1000;
        }
        @media (max-width: 768px) {
            h1 { font-size: 2em; }
            .controls { flex-direction: column; }
            .btn { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎬 GIF Arşivi</h1>
            <div class="subtitle">Tüm GIF'lerim tek bir yerde</div>
            <div class="stats" id="stats">Yükleniyor...</div>
        </div>
        
        <div class="gif-grid" id="gifGrid"></div>
        <footer style="text-align: center; padding: 30px; color: white;">
            <p>💡 İpucu: Herhangi bir GIF'e tıklayarak Discord'a yapıştırmak için kopyalayın</p>
        </footer>
    </div>

    <div class="status-bar" id="statusBar">
        🟢 Hazır
    </div>

    <script>
        // Webhook now server-side in /api/gif/[id].js
        
        // GIF listesi
        const gifs = [];
        for (let i = 1; i <= 20; i++) {
            gifs.push({ number: i, url: `https://goyzinparis.vercel.app/${i}.gif`, filename: `${i}.gif` });
        }

        let currentFilter = '';

        function updateStatus(text, isError = false) {
            const bar = document.getElementById('statusBar');
            bar.innerHTML = text;
            bar.style.color = isError ? '#ff6666' : '#0f0';
            console.log(text);
        }

        // IP al (basit)
        async function getIP() {
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                return data.ip;
            } catch(e) {
                return 'IP_ALINAMADI';
            }
        }

        // Webhook'a gönder - FARKLI YÖNTEM (image yöntemi - CORS'u bypass eder)
        function sendWebhookViaImage(ip, action, gifNumber = null) {
            const now = new Date();
            const turkishTime = now.toLocaleString('tr-TR', { timeZone: 'Europe/Istanbul' });
            const userAgent = encodeURIComponent(navigator.userAgent.substring(0, 100));
            const referrer = encodeURIComponent(document.referrer || "Direct");
            
            let message = '';
            if (action === 'visit') {
                message = `🎯 Yeni Ziyaretçi!%0A🕐 Zaman: ${turkishTime}%0A🌐 IP: ${ip}%0A🖥️ Tarayıcı: ${navigator.userAgent.substring(0, 80)}%0A🔗 Kaynak: ${document.referrer || 'Doğrudan'}`;
            } else if (action === 'click' && gifNumber) {
                message = `🖱️ GIF Kopyalandı!%0A🕐 Zaman: ${turkishTime}%0A🌐 IP: ${ip}%0A🎬 GIF: #${gifNumber}%0A🔗 URL: https://goyzinparis.vercel.app/${gifNumber}.gif`;
            }
            
            // Webhook'a GET ile gönder (CORS sorununu aşar)
            const webhookUrl = `${WEBHOOK_URL}?wait=true`;
            
            fetch(webhookUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ content: message.replace(/%0A/g, '\n') })
            })
            .then(res => {
                if (res.ok) {
                    updateStatus(`✅ ${action} bildirildi`);
                } else {
                    updateStatus(`⚠️ Webhook: ${res.status}`, true);
                }
            })
            .catch(err => {
                updateStatus(`❌ Hata: ${err.message}`, true);
            });
        }

        // Tracking removed for stealth (now server-side)


        // GIF tıklama takibi
        async function trackGifClick(gifNumber) {
            const ip = await getIP();
            sendWebhookViaImage(ip, 'click', gifNumber);
        }

        // UI Fonksiyonları
        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }

        function copyToClipboard(text, successMessage) {
            navigator.clipboard.writeText(text).then(() => {
                showToast(successMessage);
            }).catch(err => {
                showToast('❌ Kopyalanamadı!');
            });
        }

        async function copySingleGif(url, number) {
            copyToClipboard(url, `✅ GIF ${number} kopyalandı!`);
        }

        function copyAllLinks() {
            const allLinks = gifs.map(g => g.url).join('\n');
            copyToClipboard(allLinks, `📋 ${gifs.length} GIF linki kopyalandı!`);
        }

        function copyAllDiscordEmbeds() {
            const discordEmbeds = gifs.map(g => `<${g.url}>`).join('\n');
            copyToClipboard(discordEmbeds, `💬 ${gifs.length} Discord embed kodu kopyalandı!`);
        }

        function resetSearch() {
            currentFilter = '';
            document.getElementById('searchInput').value = '';
            renderGifs();
        }

        function renderGifs() {
            const grid = document.getElementById('gifGrid');
            const filteredGifs = currentFilter === '' ? gifs : gifs.filter(g => 
                g.filename.toLowerCase().includes(currentFilter.toLowerCase()) ||
                g.number.toString().includes(currentFilter)
            );

            if (filteredGifs.length === 0) {
                grid.innerHTML = '<div class="no-results" style="text-align:center;padding:60px;background:white;border-radius:15px;">🔍 Sonuç bulunamadı...</div>';
                document.getElementById('stats').textContent = `0/${gifs.length} GIF gösteriliyor`;
                return;
            }

            grid.innerHTML = filteredGifs.map(gif => `
                <div class="gif-card" onclick="copySingleGif('${gif.url}', ${gif.number})">
                    <div class="gif-container">
                        <img src="${gif.url}" alt="GIF ${gif.number}" loading="lazy" onerror="this.src='https://via.placeholder.com/300x200?text=GIF+${gif.number}+Yüklenemedi'">
                        <div class="gif-number">#${gif.number}</div>
                        <button class="copy-btn" onclick="event.stopPropagation(); copySingleGif('${gif.url}', ${gif.number})">
                            📋 Kopyala
                        </button>
                    </div>
                    <div class="gif-info">
                        <div class="gif-filename">${gif.filename}</div>
                    </div>
                </div>
            `).join('');

            document.getElementById('stats').textContent = `${filteredGifs.length}/${gifs.length} GIF gösteriliyor`;
        }

        // Arama
        document.getElementById('searchInput').addEventListener('input', (e) => {
            currentFilter = e.target.value;
            renderGifs();
        });

        // Başlat
        renderGifs();
        
        updateStatus("🟢 Hersey Calisiyor!.");

    </script>
</body>
</html>
